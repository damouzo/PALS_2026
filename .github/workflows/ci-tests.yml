# ==============================================================================
# .github/workflows/ci-tests.yml
# ==============================================================================
#
# Pipeline smoke tests on CI. Runs on every push to main and every PR.
#
# Steps:
#   1. Lint every Nextflow script (cheap, no execution).
#   2. Pull the three containers (R-seurat, R-bioc, Python) from their
#      respective registries (Sequera Wave for the R images, GHCR for Python).
#   3. Build the synthetic test dataset INSIDE the R-seurat container.
#   4. Validate the synthetic test dataset.
#   5. Smoke-run the pipeline end-to-end in synthetic mode.
#   6. Assert the key output files exist.
#
# Containers (overridable via workflow_dispatch inputs):
#   - cr.seqera.io/dmouzo/pals-r-seurat:1.0.0   (R 4.4.3 + Seurat + Signac + SeuratDisk)
#   - cr.seqera.io/dmouzo/pals-r-bioc:1.0.0     (R 4.4.3 + cicero + monocle3 + EnsDb)
#   - ghcr.io/dmouzo/pals-python-grn:1.0.0      (CellOracle + GimmeMotifs)
#
# If anything fails, the PR cannot be merged.
# ==============================================================================

name: ci-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      container_r1:
        description: "R-seurat container URL (PREP_R_SEURAT). Overrides default."
        required: false
        default: "docker://cr.seqera.io/dmouzo/pals-r-seurat:1.0.0"
      container_r2:
        description: "R-bioc container URL (PREP_R_CICERO). Overrides default."
        required: false
        default: "docker://cr.seqera.io/dmouzo/pals-r-bioc:1.0.0"
      container_py:
        description: "Python container URL (INFER_GRN). Overrides default."
        required: false
        default: "docker://ghcr.io/dmouzo/pals-python-grn:1.0.0"

jobs:
  lint:
    name: Lint Nextflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          sudo chmod +x /usr/local/bin/nextflow
      - name: Lint
        run: |
          nextflow lint . 2>&1 | tee lint.log
          if grep -qE "^Error" lint.log; then
            echo "Lint errors found. See lint.log."
            exit 1
          fi

  smoke:
    name: Pipeline smoke test (synthetic mode, 3 containers)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
              openjdk-17-jre-headless \
              graphviz \
              curl

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          sudo chmod +x /usr/local/bin/nextflow

      - name: Resolve container URLs
        id: ct
        run: |
          CT_R1="${{ github.event.inputs.container_r1 || 'docker://cr.seqera.io/dmouzo/pals-r-seurat:1.0.0' }}"
          CT_R2="${{ github.event.inputs.container_r2 || 'docker://cr.seqera.io/dmouzo/pals-r-bioc:1.0.0' }}"
          CT_PY="${{ github.event.inputs.container_py || 'docker://ghcr.io/dmouzo/pals-python-grn:1.0.0' }}"
          echo "container_r1=${CT_R1}" >> $GITHUB_OUTPUT
          echo "container_r2=${CT_R2}" >> $GITHUB_OUTPUT
          echo "container_py=${CT_PY}" >> $GITHUB_OUTPUT
          echo "Using containers:"
          echo "  R-seurat (PREP_R_SEURAT): ${CT_R1}"
          echo "  R-bioc   (PREP_R_CICERO): ${CT_R2}"
          echo "  Python   (INFER_GRN):     ${CT_PY}"

      - name: Build test data (inside R-seurat container)
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            -u "$(id -u):$(id -g)" \
            "${{ steps.ct.outputs.container_r1 }}" \
            Rscript data_demo/synthetic/build_synthetic_mini_seurat.R

      - name: Validate test data (inside R-seurat container)
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            -u "$(id -u):$(id -g)" \
            "${{ steps.ct.outputs.container_r1 }}" \
            Rscript data_demo/synthetic/validate_synthetic_mini_seurat.R

      - name: Smoke run (synthetic mode)
        env:
          NXF_OFFLINE: "true"
          NXF_ANSI_LOG: "false"
        run: |
          nextflow run main.nf \
              -profile test,docker \
              --input data_demo/synthetic/mini_seurat.rds \
              --percentile 90 \
              --execution_mode synthetic \
              --container_r1 "${{ steps.ct.outputs.container_r1 }}" \
              --container_r2 "${{ steps.ct.outputs.container_r2 }}" \
              --container_py "${{ steps.ct.outputs.container_py }}" 2>&1 | tee run.log

      - name: Assert outputs
        run: |
          test -s results/prep_r_seurat/rna.h5ad
          test -s results/prep_r_seurat/atac.h5ad
          test -s results/prep_r_seurat/seurat_object.rds
          test -s results/prep_r_cicero/all_peaks.csv
          test -s results/prep_r_cicero/cicero_connections.csv
          test -s results/infer_grn/base_GRN.csv
          test -s results/infer_grn/network_scores.csv
          test -s results/infer_grn/plots/vector_field_KO_GATA1.png
          test -s results/pipeline_info/execution_timeline.html
          test -s results/pipeline_info/pipeline_dag.svg
          echo "All expected output files present."

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: results/
          retention-days: 14
