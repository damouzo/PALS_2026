# ==============================================================================
# .github/workflows/docker-publish.yml
# ==============================================================================
#
# Build and publish the scMultiome-GRN Docker image to GitHub Container
# Registry (GHCR) on every push to main and on every release.
#
# Tags produced:
#   - latest              (on push to main)
#   - sha-<short-sha>     (on every push)
#   - <semver>            (on release published)
#   - pr-<number>         (on pull_request)
#
# Caching:
#   - Uses GitHub Actions cache (type=gha,mode=max) to dramatically speed up
#     rebuilds when only one layer changes. The conda layer is the heaviest
#     and benefits the most from this.
#
# Platforms:
#   - linux/amd64 (primary, what the demo laptops run)
#
# Post-build verification:
#   - Imports every R + Python package in a fresh container before pushing.
#     If anything is missing the push is aborted and the job fails.
# ==============================================================================

name: docker-publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase; github.repository is already lowercase but we
  # force it to be safe across forks and renamed orgs.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=auto

      - name: Build (and push on non-PR)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: containers
          file: containers/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
