# ==============================================================================
# env-r-seurat.yml — Sequera Containers (Wave) for PREP_R_SEURAT
# ==============================================================================
#
# Image: cr.seqera.io/library/python_r-base_r-essentials_r-devtools_pruned
# Purpose: R-side preprocessing of scRNA + scATAC (Seurat + Signac + SeuratDisk).
#
# This is the CONDENSED environment that has been BUILT and PRUNED by Sequera
# Wave from the original spec (no more subdependencies, only the packages that
# actually appear in the solver output).
#
# Conda solver verified: packages below all exist in conda-forge / bioconda for
# the r44 (R 4.4.3) build-string as of June 2026.
#
# Post-conda (Dockerfile RUN) installs:
#   - BiocManager          (CRAN)
#   - Signac               (Bioconductor; NOT in bioconda)
#   - SeuratDisk 0.0.9019  (CRAN; frozen in conda-forge since 2021)
# ==============================================================================

channels:
  - conda-forge
  - bioconda

dependencies:
  # ---- Python + R base + essentials ----
  - python=3.11
  - r-base=4.4.3
  - r-essentials=4.4
  - r-devtools=2.4.6

  # ---- Tidyverse (subset; pulled only when the R script needs it) ----
  - r-tidyverse=2.0.0
  - r-readr=2.2.0
  - r-dplyr=1.2.0
  - r-tidyr=1.3.1
  - r-ggplot2=3.5.2
  - r-patchwork=1.3.2
  - r-cowplot=1.2.0
  - r-reshape2=1.4.4

  # ---- Matrix / linear algebra / parallel backends ----
  - r-matrix=1.7_4
  - r-rcpp=1.1.1
  - r-rcppeigen=0.3.4.0.2
  - r-rcppparallel=5.1.11_1
  - r-future=1.67.0

  # ---- Utility R packages ----
  - r-optparse=1.7.5
  - r-hdf5r=1.3.12
  - r-remotes=2.5.0

  # ---- Bioconductor base (all S4 / IRanges / GRanges family) ----
  - bioconductor-biobase=2.66.0
  - bioconductor-biocgenerics=0.52.0
  - bioconductor-s4vectors=0.44.0
  - bioconductor-iranges=2.40.0
  - bioconductor-summarizedexperiment=1.36.0
  - bioconductor-genomicranges=1.58.0
  - bioconductor-genomeinfodb=1.42.0
  - bioconductor-delayedarray=0.32.0

  # ---- Seurat 5 (conda-forge). Signac is NOT in bioconda; installed post-conda. ----
  - r-seurat=5.4.0
