# ==============================================================================
# env-r-bioc.yml — Sequera Containers (Wave) for PREP_R_CICERO
# ==============================================================================
#
# Image: cr.seqera.io/library/python_r-base_r-essentials_r-remotes_pruned
# Purpose: R-side Cicero co-accessibility computation (cicero + monocle3 +
#          EnsDb.Mmusculus.v79).
#
# This is the MINIMAL environment that Sequera Wave built and pruned from the
# original spec. The actual cicero / monocle3 / EnsDb packages are NOT in
# conda-forge or bioconda (verified June 2026) — they are Bioconductor-only and
# must be installed via `BiocManager::install()` in a post-conda RUN step.
#
# The packages listed below are the only ones the conda solver needs to resolve
# in the YAML; the rest are pulled by BiocManager at build time.
# ==============================================================================

channels:
  - conda-forge
  - bioconda

dependencies:
  # ---- Python + R base + essentials (minimal) ----
  - python=3.11
  - r-base=4.4.3
  - r-essentials=4.4
  - r-remotes=2.5.0

  # ---- Matrix algebra (used by monocle3 transitives) ----
  - r-matrix=1.7_4

  # ---- Bioconductor S4 / IRanges / GRanges family ----
  - bioconductor-biobase=2.66.0
  - bioconductor-biocgenerics=0.52.0
  - bioconductor-genomicranges=1.58.0
  - bioconductor-genomeinfodb=1.42.0
  - bioconductor-s4vectors=0.44.0
  - bioconductor-iranges=2.40.0
  - bioconductor-summarizedexperiment=1.36.0
  - bioconductor-delayedarray=0.32.0

  # NOTE: cicero, monocle3 and EnsDb.Mmusculus.v79 are NOT in conda-forge or
  # bioconda for the r44 build-string. They are installed by BiocManager in the
  # Dockerfile's post-conda RUN step (see Dockerfile in Sequera Wave build).
